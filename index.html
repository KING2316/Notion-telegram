<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Telegram Feed</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f4;
      color: #1a1a18;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.5rem 1rem;
    }

    .card {
      background: #ffffff;
      border-radius: 14px;
      border: 1px solid #e5e5e3;
      width: 100%;
      max-width: 600px;
      overflow: hidden;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 18px;
      border-bottom: 1px solid #e5e5e3;
    }

    .tg-logo {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      background: #2AABEE;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .tg-logo svg {
      width: 17px;
      height: 17px;
      fill: white;
    }

    .header-text {
      flex: 1;
    }

    .header-text h1 {
      font-size: 14px;
      font-weight: 600;
      color: #1a1a18;
    }

    .header-text p {
      font-size: 11px;
      color: #888784;
      margin-top: 1px;
    }

    .input-section {
      padding: 14px 18px;
      display: flex;
      gap: 8px;
      border-bottom: 1px solid #e5e5e3;
    }

    .input-section input {
      flex: 1;
      height: 34px;
      border: 1px solid #d1d0cc;
      border-radius: 8px;
      padding: 0 11px;
      font-size: 13px;
      color: #1a1a18;
      background: #fafaf9;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
    }

    .input-section input:focus {
      border-color: #2AABEE;
      background: #fff;
    }

    .input-section input::placeholder {
      color: #aaa9a6;
    }

    .btn-load {
      height: 34px;
      padding: 0 16px;
      border-radius: 8px;
      background: #2AABEE;
      color: white;
      font-size: 13px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      white-space: nowrap;
      font-family: inherit;
      transition: background 0.15s;
    }

    .btn-load:hover { background: #1A96D4; }
    .btn-load:active { background: #1582BA; }

    .embed-area {
      min-height: 420px;
      position: relative;
    }

    .placeholder {
      min-height: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #aaa9a6;
      padding: 2rem;
      text-align: center;
    }

    .placeholder-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: #EAF6FD;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 4px;
    }

    .placeholder-icon svg {
      width: 24px;
      height: 24px;
      fill: #2AABEE;
      opacity: 0.6;
    }

    .placeholder p {
      font-size: 13px;
      max-width: 260px;
      line-height: 1.5;
    }

    .embed-area iframe {
      width: 100%;
      min-height: 520px;
      border: none;
      display: block;
    }

    .card-footer {
      padding: 10px 18px;
      border-top: 1px solid #e5e5e3;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .channel-url {
      flex: 1;
      font-size: 11px;
      color: #888784;
      font-family: 'Courier New', monospace;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .channel-url a {
      color: #2AABEE;
      text-decoration: none;
    }

    .channel-url a:hover { text-decoration: underline; }

    .btn-open {
      font-size: 11px;
      color: #888784;
      background: none;
      border: 1px solid #e5e5e3;
      border-radius: 6px;
      padding: 3px 10px;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
      transition: border-color 0.15s, color 0.15s;
    }

    .btn-open:hover { border-color: #2AABEE; color: #2AABEE; }

    #footer { display: none; }
  </style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <div class="tg-logo">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12L7.26 14.4l-2.96-.924c-.643-.204-.657-.643.136-.953l11.57-4.461c.537-.194 1.006.131.888.16z"/>
      </svg>
    </div>
    <div class="header-text">
      <h1>Telegram Live Feed</h1>
      <p>Введи username публічного каналу</p>
    </div>
  </div>

  <div class="input-section">
    <input
      type="text"
      id="channelInput"
      placeholder="@channel або channel_name"
      autocomplete="off"
      spellcheck="false"
    />
    <button class="btn-load" onclick="loadChannel()">Завантажити</button>
  </div>

  <div class="embed-area" id="embedArea">
    <div class="placeholder" id="placeholder">
      <div class="placeholder-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12L7.26 14.4l-2.96-.924c-.643-.204-.657-.643.136-.953l11.57-4.461c.537-.194 1.006.131.888.16z"/>
        </svg>
      </div>
      <p>Введи назву публічного Telegram-каналу і натисни «Завантажити»</p>
    </div>
  </div>

  <div class="card-footer" id="footer">
    <span class="channel-url" id="channelUrl"></span>
    <button class="btn-open" id="openBtn" onclick="openChannel()">Відкрити в Telegram</button>
  </div>
</div>

<script>
  let currentChannel = '';

  function loadChannel() {
    let val = document.getElementById('channelInput').value.trim();
    if (!val) return;

    val = val.replace(/^@/, '').replace(/https?:\/\/t\.me\//, '').split('/')[0].split('?')[0];
    if (!val) return;

    currentChannel = val;

    const area = document.getElementById('embedArea');
    const ph = document.getElementById('placeholder');
    const footer = document.getElementById('footer');
    const urlSpan = document.getElementById('channelUrl');

    ph.style.display = 'none';

    const existingIframe = area.querySelector('iframe');
    if (existingIframe) existingIframe.remove();

    const iframe = document.createElement('iframe');
    iframe.src = `https://t.me/s/${val}?embed=1&mode=tme`;
    iframe.setAttribute('allowtransparency', 'true');
    iframe.setAttribute('scrolling', 'yes');
    iframe.setAttribute('frameborder', '0');
    area.appendChild(iframe);

    footer.style.display = 'flex';
    urlSpan.innerHTML = `<a href="https://t.me/s/${val}" target="_blank" rel="noopener">t.me/s/${val}</a>`;
  }

  function openChannel() {
    if (currentChannel) {
      window.open(`https://t.me/${currentChannel}`, '_blank', 'noopener');
    }
  }

  document.getElementById('channelInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') loadChannel();
  });

  // Якщо URL містить параметр ?channel=назва — завантажити автоматично
  const params = new URLSearchParams(window.location.search);
  const autoChannel = params.get('channel');
  if (autoChannel) {
    document.getElementById('channelInput').value = autoChannel;
    loadChannel();
  }
</script>

</body>
</html>
